{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var t=localStorage.getItem('pu-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})()</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#c9a030" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1117"  media="(prefers-color-scheme: dark)">
<title id="pageTitle">Profile — PU-Connect</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PU-Connect">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'Base_app/css/tokens.css' %}">

<style>
/* ── Layout ── */
.pub-page { min-height: 100vh; background: var(--bg); color: var(--text); }

/* ── Top bar ── */
.pub-bar {
  position: sticky; top: 0; z-index: 50;
  height: 56px; display: flex; align-items: center; gap: .75rem;
  padding: 0 1rem;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.pub-bar-back {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; flex-shrink: 0;
}
.pub-bar-back:hover { background: var(--border); }
.pub-bar-title { flex: 1; font-weight: 600; font-size: .92rem; }
.pub-theme-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-2); cursor: pointer;
}
.pub-theme-btn:hover { color: var(--text); background: var(--border); }

[data-theme="dark"]  .theme-sun  { display: block; }
[data-theme="dark"]  .theme-moon { display: none;  }
[data-theme="light"] .theme-sun  { display: none;  }
[data-theme="light"] .theme-moon { display: block; }
.theme-sun { display: none; }
.theme-moon { display: block; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .theme-sun  { display: block; }
  :root:not([data-theme="light"]) .theme-moon { display: none;  }
}

/* ── Body ── */
.pub-body { max-width: 640px; margin: 0 auto; padding-bottom: 3rem; }

/* ── Cover ── */
.pub-cover {
  height: 100px;
  background: linear-gradient(135deg, var(--accent-dim) 0%, var(--surface-2) 100%);
  position: relative;
}

/* ── Avatar row ── */
.pub-avatar-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 1rem 1rem;
  margin-top: -36px;
}
.pub-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 1.8rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--bg);
  overflow: hidden; flex-shrink: 0;
}
.pub-avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── Follow button ── */
.pub-follow-btn {
  padding: .5rem 1.3rem;
  border-radius: var(--radius-full);
  font-size: .88rem; font-weight: 700;
  font-family: var(--font-sans);
  cursor: pointer; border: 1.5px solid var(--accent);
  background: var(--accent); color: #fff;
  transition: all .18s;
  margin-bottom: 4px;
}
.pub-follow-btn.following {
  background: transparent; color: var(--text-2); border-color: var(--border-2);
}
.pub-follow-btn:hover { opacity: .85; }
.pub-follow-btn:disabled { opacity: .6; cursor: default; }
.pub-own-btn {
  padding: .5rem 1.3rem;
  border-radius: var(--radius-full);
  font-size: .88rem; font-weight: 600;
  font-family: var(--font-sans);
  background: var(--surface-2); border: 1.5px solid var(--border);
  color: var(--text); cursor: pointer;
  margin-bottom: 4px;
  text-decoration: none; display: inline-flex; align-items: center;
}
.pub-own-btn:hover { background: var(--border); }

/* ── Profile info ── */
.pub-info { padding: 0 1rem .5rem; }
.pub-name { font-size: 1.15rem; font-weight: 700; }
.pub-username { font-size: .85rem; color: var(--text-2); margin: .1rem 0 .4rem; }
.pub-bio { font-size: .88rem; line-height: 1.55; margin-bottom: .5rem; }
.pub-tag {
  display: inline-flex; align-items: center; gap: .3rem;
  font-size: .76rem; color: var(--text-2); margin-right: .75rem;
}

/* ── Stats strip ── */
.pub-stats {
  display: flex;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: .75rem 0 0;
}
.pub-stat {
  flex: 1; text-align: center; padding: .85rem .5rem;
  cursor: default;
}
.pub-stat + .pub-stat { border-left: 1px solid var(--border); }
.pub-stat-num {
  display: block; font-size: 1.2rem; font-weight: 800;
  color: var(--text); letter-spacing: -.3px;
}
.pub-stat-lbl {
  display: block; font-size: .68rem; color: var(--text-2); margin-top: .1rem;
}

/* ── Grid ── */
.pub-grid-head {
  display: flex; align-items: center; gap: .5rem;
  padding: 1rem 1rem .5rem;
  font-size: .8rem; font-weight: 600; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .3px;
}
.pub-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}
.pub-grid-item {
  aspect-ratio: 1;
  background: var(--surface-2);
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.pub-grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.pub-grid-item-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
}
.pub-grid-item-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0); transition: background .15s;
  display: flex; align-items: center; justify-content: center;
}
.pub-grid-item:hover .pub-grid-item-overlay { background: rgba(0,0,0,.25); }
.pub-price-pill {
  position: absolute; bottom: .4rem; left: .4rem;
  background: rgba(0,0,0,.65); color: #fff;
  font-size: .68rem; font-weight: 600;
  padding: .18rem .42rem; border-radius: 4px;
}

/* ── Empty ── */
.pub-empty {
  padding: 3rem 1rem; text-align: center; color: var(--text-2);
  font-size: .88rem;
}

/* ── Responsive ── */
/* Wider screens: expand max-width */
@media (min-width: 768px) {
  .pub-body { max-width: 768px; }
  .pub-cover { height: 140px; }
  .pub-avatar { width: 96px; height: 96px; font-size: 2.2rem; }
  .pub-stat-num { font-size: 1.4rem; }
}
@media (min-width: 1024px) {
  .pub-body { max-width: 860px; }
}
/* Small phones */
@media (max-width: 380px) {
  .pub-avatar-row { gap: .5rem; }
  .pub-follow-btn, .pub-own-btn { padding: .42rem 1rem; font-size: .82rem; }
  .pub-stat-num { font-size: 1rem; }
  .pub-stat-lbl { font-size: .62rem; }
  .pub-name { font-size: 1rem; }
}
/* Safe area inset for iOS home bar */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .pub-body { padding-bottom: calc(3rem + env(safe-area-inset-bottom)); }
}

/* ── Skeleton ── */
.pub-skel-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surface-2); border: 3px solid var(--bg);
}
.pub-skel-line {
  height: 14px; border-radius: 6px; background: var(--surface-2); margin-bottom: .5rem;
}

/* ── Toast ── */
.pub-toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: .55rem 1.1rem;
  font-size: .84rem; font-weight: 500;
  box-shadow: var(--shadow); opacity: 0; pointer-events: none;
  transition: opacity .22s, transform .22s; white-space: nowrap; z-index: 200;
}
.pub-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<body class="pub-page">

<header class="pub-bar">
  <button class="pub-bar-back" onclick="history.length>1?history.back():location.href='/'" aria-label="Back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <span class="pub-bar-title" id="barTitle">Profile</span>
  {% if user.is_authenticated %}
  <button class="pub-theme-btn" id="notifBtn" aria-label="Notifications" style="position:relative">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span class="notif-dot" id="notifDot" style="display:none"></span>
  </button>
  {% endif %}
  <button class="pub-theme-btn" id="themeBtn" aria-label="Toggle theme">
    <svg class="theme-sun"  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="theme-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<main class="pub-body">
  <div class="pub-cover"></div>

  <!-- Avatar + action button -->
  <div class="pub-avatar-row">
    <div class="pub-avatar" id="pubAvatar">
      <svg width="40%" height="40%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div id="actionArea"></div>
  </div>

  <!-- Info -->
  <div class="pub-info">
    <div class="pub-name"  id="pubName">—</div>
    <div class="pub-username" id="pubUsername"></div>
    <div class="pub-bio"   id="pubBio"   style="display:none"></div>
    <div id="pubTags"></div>

    <!-- Stats -->
    <div class="pub-stats">
      <div class="pub-stat">
        <span class="pub-stat-num" id="pubPosts">—</span>
        <span class="pub-stat-lbl">Posts</span>
      </div>
      <div class="pub-stat">
        <span class="pub-stat-num" id="pubFollowers">—</span>
        <span class="pub-stat-lbl">Followers</span>
      </div>
      <div class="pub-stat">
        <span class="pub-stat-num" id="pubFollowing">—</span>
        <span class="pub-stat-lbl">Following</span>
      </div>
    </div>
  </div>

  <!-- Listings grid -->
  <div class="pub-grid-head">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Listings
  </div>
  <div class="pub-grid" id="pubGrid"></div>
  <div class="pub-empty" id="pubEmpty" style="display:none">No active listings yet</div>
</main>

<div class="pub-toast" id="toast"></div>

<script>
const TARGET_USERNAME = '{{ target_username|escapejs }}';
let _data = {};

/* ── Theme — handled by base/theme.html include below ── */

/* ── Toast ── */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── Follow state ── */
function renderActionBtn(isOwn, isFollowing, followsYou){
  const area = document.getElementById('actionArea');
  if(isOwn){
    area.innerHTML = '<a href="/profile/" class="pub-own-btn">Edit Profile</a>';
    return;
  }
  {% if user.is_authenticated %}
  const label = isFollowing ? 'Following' : (followsYou ? 'Follow Back' : 'Follow');
  const cls   = isFollowing ? ' following' : '';
  area.innerHTML = `<button class="pub-follow-btn${cls}" id="followBtn" onclick="toggleFollow()">${label}</button>`;
  document.getElementById('followBtn')._isFollowing = isFollowing;
  {% else %}
  area.innerHTML = '<a href="/auth/" class="pub-follow-btn" style="text-decoration:none">Follow</a>';
  {% endif %}
}

function updateFollowBtn(isFollowing, followsYou, newCount){
  const btn = document.getElementById('followBtn');
  if(!btn) return;
  btn._isFollowing = isFollowing;
  if(isFollowing){
    btn.textContent = 'Following';
    btn.classList.add('following');
  } else if(followsYou){
    btn.textContent = 'Follow Back';
    btn.classList.remove('following');
  } else {
    btn.textContent = 'Follow';
    btn.classList.remove('following');
  }
  document.getElementById('pubFollowers').textContent = newCount;
}

async function toggleFollow(){
  const btn = document.getElementById('followBtn');
  if(!btn || btn.disabled) return;
  btn.disabled = true;
  try {
    const csrf = document.cookie.split('; ').find(r=>r.startsWith('csrftoken='))?.split('=')[1] || '';
    const res  = await fetch(`/profile/api/follow/${TARGET_USERNAME}/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': csrf }
    });
    const d = await res.json();
    updateFollowBtn(d.following, _data.follows_you && !d.following, d.followers_count);
    showToast(d.following ? 'Following @' + TARGET_USERNAME : 'Unfollowed @' + TARGET_USERNAME);
  } catch(e){ showToast('Could not update follow'); }
  btn.disabled = false;
}

/* ── Render profile ── */
function render(d){
  _data = d;
  document.title = `${d.name} (@${d.username}) — PU-Connect`;
  document.getElementById('barTitle').textContent = '@' + d.username;
  const _nameEl = document.getElementById('pubName');
  _nameEl.textContent = d.name;
  if(d.is_verified){
    const _vb = document.createElement('span');
    _vb.className = 'pu-verified pu-verified-lg';
    _vb.title = 'Verified Student';
    _vb.style.marginLeft = '.3rem';
    _vb.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="4 12 9 17 20 6"/></svg>';
    if(d.is_staff || d.is_superuser) _vb.classList.add('pu-verified-gold');
    _nameEl.appendChild(_vb);
  }
  document.getElementById('pubUsername').textContent = '@' + d.username + (d.joined ? ' · Joined ' + d.joined : '');

  if(d.bio){ const b = document.getElementById('pubBio'); b.textContent = d.bio; b.style.display = ''; }

  // Tags
  const tags = [];
  if(d.faculty)  tags.push(`<span class="pub-tag"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>${d.faculty}</span>`);
  if(d.location) tags.push(`<span class="pub-tag"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${d.location}</span>`);
  document.getElementById('pubTags').innerHTML = tags.join('');

  // Avatar
  const av = document.getElementById('pubAvatar');
  if(d.avatarSrc){
    av.innerHTML = `<img src="${d.avatarSrc}" alt="${d.name}">`;
  } else {
    av.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" style="width:100%;height:100%;border-radius:50%;display:block"><circle cx="20" cy="20" r="20" fill="#e4e6ea"/><circle cx="20" cy="16" r="7.5" fill="#bcc0c4"/><path d="M5 36.5C5 29 11.7 23 20 23s15 6 15 13.5" fill="#bcc0c4"/></svg>';
  }

  // Stats
  document.getElementById('pubPosts').textContent     = d.posts_count;
  document.getElementById('pubFollowers').textContent = d.followers_count;
  document.getElementById('pubFollowing').textContent = d.following_count;

  // Action button
  renderActionBtn(d.is_own, d.is_following, d.follows_you);

  // Listings grid
  renderGrid(d.active_listings || []);
}

function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }

function renderGrid(items){
  const grid  = document.getElementById('pubGrid');
  const empty = document.getElementById('pubEmpty');
  if(!items.length){ grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  grid.innerHTML = items.map(l => {
    const price = l.contact_for_price ? 'Contact' : `GH₵ ${parseFloat(l.price).toLocaleString()}`;
    const img   = l.image_url
      ? `<img src="${esc(l.image_url)}" alt="${esc(l.title)}" loading="lazy">`
      : `<div class="pub-grid-item-placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
    return `<div class="pub-grid-item" onclick="location.href='/listings/${l.id}/'">
      ${img}
      <div class="pub-grid-item-overlay"></div>
      <span class="pub-price-pill">${esc(price)}</span>
    </div>`;
  }).join('');
}

/* ── Load ── */
async function loadProfile(){
  try {
    const res  = await fetch(`/profile/api/user/${TARGET_USERNAME}/`);
    if(!res.ok) throw new Error();
    const data = await res.json();
    render(data);
  } catch(e){
    document.getElementById('pubName').textContent = 'User not found';
  }
}

loadProfile();
</script>
{% if user.is_authenticated %}
<script src="{% static 'Base_app/js/notifications.js' %}"></script>
{% endif %}
{% include 'base/theme.html' %}
</body>
</html>

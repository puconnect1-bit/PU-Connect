upstream daphne {
    server web:8000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    server_name pentvarsconnect.com www.pentvarsconnect.com;

    # --- SSL (managed by Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/pentvarsconnect.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pentvarsconnect.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    # --- Service Worker: allow it to claim scope / ---
    location = /sw.js {
        proxy_pass http://daphne;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Service-Worker-Allowed "/";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # --- Static files (WhiteNoise serves them via Django, but Nginx is faster) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- WebSocket connections (Django Channels) ---
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- All other requests → Daphne ---
    location / {
        proxy_pass http://daphne;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        client_max_body_size 50M;
    }
}

{% load static %}<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>(function(){var t=localStorage.getItem('pu-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two-Factor Authentication — PU-Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'Auth_app/css/auth.css' %}">
  <style>
    .tfa-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:1.5rem}
    .tfa-box{background:var(--card-bg,#1c1f27);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:20px;padding:2.2rem 2rem;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.45)}
    [data-theme="light"] .tfa-box{background:#fff;border-color:rgba(0,0,0,.08);box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .tfa-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,rgba(56,151,240,.18),rgba(56,151,240,.06));border:1px solid rgba(56,151,240,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.6rem}
    .tfa-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:.35rem;color:var(--text,#f0eeea)}
    [data-theme="light"] .tfa-title{color:#1a1a1a}
    .tfa-sub{font-size:.85rem;color:var(--muted,#7a7e8a);text-align:center;line-height:1.6;margin-bottom:1.75rem}
    .code-inputs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
    .code-digit{width:46px;height:56px;border-radius:10px;border:2px solid var(--border,rgba(255,255,255,.1));background:var(--inp-bg,rgba(255,255,255,.06));color:var(--text,#f0eeea);font-size:1.4rem;font-weight:700;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'DM Sans',sans-serif;-moz-appearance:textfield}
    [data-theme="light"] .code-digit{background:rgba(0,0,0,.04);color:#1a1a1a;border-color:rgba(0,0,0,.12)}
    .code-digit::-webkit-outer-spin-button,.code-digit::-webkit-inner-spin-button{-webkit-appearance:none}
    .code-digit:focus{border-color:#3897f0;box-shadow:0 0 0 3px rgba(56,151,240,.15)}
    .code-digit.filled{border-color:rgba(56,151,240,.5)}
    .tfa-btn{width:100%;height:46px;border-radius:12px;border:none;background:linear-gradient(135deg,#3897f0,#1a73e8);color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s;margin-bottom:1rem}
    .tfa-btn:hover{opacity:.9;transform:translateY(-1px)}
    .tfa-btn:active{transform:translateY(0)}
    .tfa-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .tfa-back{display:block;text-align:center;font-size:.82rem;color:var(--muted,#7a7e8a);text-decoration:none;transition:color .2s}
    .tfa-back:hover{color:var(--text,#f0eeea)}
    [data-theme="light"] .tfa-back:hover{color:#1a1a1a}
    .tfa-err{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);border-radius:8px;padding:.65rem .9rem;font-size:.82rem;color:#ff6b6b;text-align:center;margin-bottom:1rem;display:none}
    .tfa-err.show{display:block}
    .resend-row{text-align:center;font-size:.78rem;color:var(--muted,#7a7e8a);margin-top:.75rem}
    .resend-row a{color:#3897f0;text-decoration:none;font-weight:500}
  </style>
</head>
<body style="margin:0;background:var(--page-bg,#0d0e11)">
<div class="tfa-wrap">
  <div class="tfa-box">
    {% csrf_token %}
    <div class="tfa-icon">🔐</div>
    <div class="tfa-title">Two-Factor Auth</div>
    <p class="tfa-sub">Open your authenticator app and enter the 6-digit code for <strong>PU-Connect</strong>.</p>

    <div class="code-inputs" id="codeInputs">
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" id="d0"/>
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1"/>
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2"/>
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3"/>
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4"/>
      <input class="code-digit" type="number" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d5"/>
    </div>

    <div class="tfa-err" id="tfaErr"></div>
    <button class="tfa-btn" id="tfaBtn" onclick="submitCode()" disabled>Verify Code</button>
    <a href="{% url 'auth:auth_view' %}" class="tfa-back">← Back to login</a>
  </div>
</div>

<script>
  const digits = Array.from({length:6},(_,i)=>document.getElementById('d'+i));
  const btn = document.getElementById('tfaBtn');
  const errEl = document.getElementById('tfaErr');

  digits.forEach((inp, i) => {
    inp.addEventListener('input', e => {
      const v = inp.value.replace(/\D/g,'');
      inp.value = v ? v[v.length-1] : '';
      inp.classList.toggle('filled', !!inp.value);
      if (inp.value && i < 5) digits[i+1].focus();
      checkReady();
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !inp.value && i > 0) { digits[i-1].focus(); digits[i-1].value=''; digits[i-1].classList.remove('filled'); checkReady(); }
      if (e.key === 'Enter') submitCode();
    });
    inp.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
      text.split('').slice(0,6).forEach((ch,j) => { if(digits[j]){ digits[j].value=ch; digits[j].classList.add('filled'); }});
      const next = Math.min(text.length, 5);
      digits[next].focus();
      checkReady();
    });
  });

  function checkReady() {
    const code = getCode();
    btn.disabled = code.length !== 6;
  }

  function getCode() { return digits.map(d=>d.value).join(''); }

  function showErr(msg) { errEl.textContent=msg; errEl.classList.add('show'); }
  function hideErr() { errEl.classList.remove('show'); }

  async function submitCode() {
    const code = getCode();
    if (code.length !== 6) return;
    btn.disabled = true;
    btn.textContent = 'Verifying…';
    hideErr();
    try {
      const res = await fetch('{% url "auth:api_verify_2fa" %}', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
        body: JSON.stringify({code})
      });
      const data = await res.json();
      if (res.ok && data.status === 'success') {
        btn.textContent = '✓ Verified';
        window.location.href = '{% url "dashboard:dashboard" %}';
      } else {
        showErr(data.message || 'Invalid code. Please try again.');
        digits.forEach(d=>{ d.value=''; d.classList.remove('filled'); });
        digits[0].focus();
        btn.textContent = 'Verify Code';
        checkReady();
      }
    } catch(e) {
      showErr('Connection error. Please try again.');
      btn.textContent = 'Verify Code';
      btn.disabled = false;
    }
  }

  function getCookie(name) {
    let v=null;
    document.cookie.split(';').forEach(c=>{ const t=c.trim(); if(t.startsWith(name+'=')) v=decodeURIComponent(t.slice(name.length+1)); });
    return v;
  }

  // Auto-focus first digit on load
  digits[0].focus();

  // Theme
  const isDark = localStorage.getItem('pu-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const pageBg = isDark ? '#0d0e11' : '#f0ede8';
  document.body.style.background = pageBg;
</script>
</body>
</html>

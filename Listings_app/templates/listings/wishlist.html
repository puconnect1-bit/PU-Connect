<script>
/* ── THEME ── */
var _H = document.documentElement;
var _TB = document.getElementById('thbtn');
var _dark = true;
function applyTheme(d) {
  _H.setAttribute('data-theme', d ? 'dark' : 'light');
  _TB.innerHTML = d ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  _dark = d;
  localStorage.setItem('pu-theme', d ? 'dark' : 'light');
  var m = document.getElementById('themeColorMeta');
  if (m) m.setAttribute('content', d ? '#0d0e11' : '#f0ede8');
}
(function(){ var sv = localStorage.getItem('pu-theme'); applyTheme(sv ? sv === 'dark' : true); })();
_TB.addEventListener('click', function(){ applyTheme(!_dark); });

/* ── SIDEBAR ── */
var _sb = document.getElementById('sidebar');
var _ov = document.getElementById('ov');
document.getElementById('hbg').onclick = function() {
  _sb.classList.add('open'); _ov.classList.add('on'); document.body.style.overflow = 'hidden';
};
function closeSidebar() {
  _sb.classList.remove('open'); _ov.classList.remove('on'); document.body.style.overflow = '';
}
if (window.innerWidth >= 960) _sb.classList.add('open');
window.addEventListener('resize', function() {
  if (window.innerWidth >= 960) { _sb.classList.add('open'); _ov.classList.remove('on'); }
  else _sb.classList.remove('open');
});

  /* ════════════════════════════════════
   DATA
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtPrice(l) {
  if (l.contactForPrice || (l.price != null && Number(l.price) === 0)) return 'Contact Buyer';
  if (l.priceLabel) {
    if (l.priceLabel === 'Contact for Price' || l.priceLabel === 'Contact') return 'Contact Buyer';
    return l.priceLabel;
  }
  if (l.price != null && l.price !== '') {
    return 'GH\u20B5\u00A0' + Number(l.price).toLocaleString() + (l.negotiable ? ' (Neg.)' : '');
  }
  return '\u2014';
}
function timeAgo(ts) {
  if (!ts) return '';
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'Just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 604800) return Math.floor(s / 86400) + 'd ago';
  return new Date(ts).toLocaleDateString('en-GH', { day: 'numeric', month: 'short' });
}

/* ── LOAD DATA ──
   Primary source: pu-wish-items (id → object map, written by detail page).
   Fallback: cross-reference pu-listings for legacy saved ids.
── */
function loadWishlistItems() {
  try {
    var rawIds = JSON.parse(localStorage.getItem('pu-wish-ids') || '[]');
    if (!rawIds.length) return [];
    var itemMap = JSON.parse(localStorage.getItem('pu-wish-items') || '{}');
    var results = [];
    var missing = [];
    for (var i = 0; i < rawIds.length; i++) {
      var sid = String(rawIds[i]);
      if (itemMap[sid]) {
        results.push(itemMap[sid]);
      } else {
        missing.push(sid);
      }
    }
    /* Legacy fallback: scan pu-listings for any ids not in pu-wish-items */
    if (missing.length) {
      var missingSet = {};
      for (var j = 0; j < missing.length; j++) missingSet[missing[j]] = true;
      var all = JSON.parse(localStorage.getItem('pu-listings') || '[]');
      for (var k = 0; k < all.length; k++) {
        if (missingSet[String(all[k].id)]) results.push(all[k]);
      }
    }
    return results;
  } catch(e) { return []; }
}

/* ── STATE ── */
var ITEMS = loadWishlistItems();
var wishIds = {};
ITEMS.forEach(function(i){ wishIds[String(i.id)] = true; });
var activeCat = 'all';

/* ── RENDER ── */
function render() {
  var g = document.getElementById('wg');
  var countEl = document.getElementById('wish-count');

  var vis = ITEMS.filter(function(l) {
    if (!wishIds[String(l.id)]) return false;
    if (activeCat === 'all') return true;
    if (activeCat === 'service') return l.type === 'service';
    var cat = (l.cat || '').toLowerCase();
    var category = (l.category || '').toLowerCase();
    return cat === activeCat || category.indexOf(activeCat) !== -1;
  });

  var total = Object.keys(wishIds).length;
  if (countEl) countEl.textContent = total + ' saved item' + (total !== 1 ? 's' : '');

  if (!vis.length) {
    g.innerHTML = '<div class="empty-state">'
      + '<div class="es-icon"><svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>'
      + '<p>' + (activeCat === 'all' ? 'No saved items yet.<br>Browse listings and tap the heart to save.' : 'No saved items in this category.') + '</p>'
      + '<a href="{% url 'dashboard:dashboard' %}" class="es-btn">Browse Listings</a>'
      + '</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < vis.length; i++) {
    var l = vis[i];
    var isSvc   = l.type === 'service';
    var title   = escH(l.title || l.name || 'Untitled');
    var price   = escH(fmtPrice(l));
    var seller  = escH(l.sellerUsername || l.seller || '');
    var catLbl  = escH(l.category || l.cat || (isSvc ? 'Service' : 'Product'));
    var typeClr = isSvc ? '#5be5c5' : 'var(--a)';
    var typeBg  = isSvc ? 'rgba(91,229,197,.14)' : 'rgba(232,201,106,.14)';
    var idSafe  = String(l.id).replace(/['"\\<>]/g, '');
    var isSold  = l.status === 'sold';
    var ago     = timeAgo(l.postedAt);

    /* Only render <img> when there is an actual src */
    var imgHTML = (l.img && l.img.length > 4)
      ? '<img src="' + escH(l.img) + '" alt="' + title + '" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block"/>'
      : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--inp)">' + (isSvc ? '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>') + '</div>';

    var soldHTML = isSold
      ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.72rem;font-weight:700;letter-spacing:.8px">SOLD</div>'
      : '';

    html += '<div class="wcard" onclick="openDetail(\'' + idSafe + '\')">'
      + '<div class="wcimg">' + imgHTML
      + '<span class="wcbg" style="background:' + typeBg + ';color:' + typeClr + '">' + catLbl + '</span>'
      + soldHTML + '</div>'
      + '<div class="wcbd">'
      + '<div class="wcnm">' + title + '</div>'
      + '<div class="wcpr">' + price + '</div>'
      + '<div class="wcrw">'
      + '<span class="wcsl">@' + seller + (ago ? ' \u00B7 ' + ago : '') + '</span>'
      + '<button class="rm-btn" onclick="event.stopPropagation();removeWish(\'' + idSafe + '\')" title="Remove"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>'
      + '</div></div></div>';
  }
  g.innerHTML = html;
}

/* ── REMOVE ── */
function removeWish(id) {
  id = String(id);
  delete wishIds[id];
  ITEMS = ITEMS.filter(function(i){ return String(i.id) !== id; });
  try {
    localStorage.setItem('pu-wish-ids', JSON.stringify(Object.keys(wishIds)));
    var itemMap = JSON.parse(localStorage.getItem('pu-wish-items') || '{}');
    delete itemMap[id];
    localStorage.setItem('pu-wish-items', JSON.stringify(itemMap));
  } catch(e) {}
  render();
  showToast('Removed from saved');
}

/* ── FILTER ── */
function filt(pill, cat) {
  document.querySelectorAll('.fp').forEach(function(p){ p.classList.remove('on'); });
  pill.classList.add('on');
  activeCat = cat;
  render();
}

/* ── OPEN DETAIL ── */
function openDetail(id) {
  location.href = '/listings/' + String(id) + '/';
}

/* ── TOAST ── */
var _toastTimer;
function showToast(msg) {
  var t = document.getElementById('wl-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'wl-toast';
    t.style.position = 'fixed';
    t.style.bottom = 'calc(var(--bh,78px) + 18px)';
    t.style.left = '50%';
    t.style.transform = 'translateX(-50%) translateY(20px)';
    t.style.background = 'var(--card)';
    t.style.border = '1px solid rgba(255,255,255,.1)';
    t.style.borderRadius = '10px';
    t.style.padding = '.6rem 1.2rem';
    t.style.fontSize = '.82rem';
    t.style.fontWeight = '500';
    t.style.color = 'var(--t)';
    t.style.boxShadow = '0 8px 32px rgba(0,0,0,.5)';
    t.style.opacity = '0';
    t.style.transition = 'opacity .3s,transform .3s';
    t.style.pointerEvents = 'none';
    t.style.zIndex = '999';
    t.style.whiteSpace = 'nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(20px)';
  }, 2500);
}

/* ── INIT ── */
render();

window.addEventListener('focus', function() {
  ITEMS = loadWishlistItems();
  wishIds = {};
  ITEMS.forEach(function(i){ wishIds[String(i.id)] = true; });
  render();
});
</script>

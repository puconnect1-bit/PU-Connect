{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){var t=localStorage.getItem('pu-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})()</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#c9a030" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1117"  media="(prefers-color-scheme: dark)">
<title>You're Offline — PU-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'Base_app/css/tokens.css' %}">
<style>
html, body {
  height: 100%;
  margin: 0;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem 1.5rem;
  text-align: center;
  background: var(--bg);
  color: var(--text);
}

.offline-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  box-shadow: var(--shadow-lg);
}

.offline-icon-wrap {
  width: 72px;
  height: 72px;
  margin: 0 auto 1.5rem;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  position: relative;
}

.offline-pulse {
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--border);
  animation: pulse 2.2s ease-out infinite;
  opacity: 0;
}

@keyframes pulse {
  0%   { transform: scale(1);   opacity: .6; }
  100% { transform: scale(1.4); opacity: 0;  }
}

.offline-title {
  font-size: 1.3rem;
  font-weight: 800;
  letter-spacing: -.3px;
  margin-bottom: .5rem;
}

.offline-sub {
  font-size: .9rem;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 1.75rem;
}

.offline-retry {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .45rem;
  width: 100%;
  padding: .75rem 1.25rem;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .92rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .18s, transform .14s;
  margin-bottom: .75rem;
}
.offline-retry:hover   { background: var(--accent-hi); transform: translateY(-1px); }
.offline-retry:active  { transform: scale(.98); }
.offline-retry:disabled { opacity: .6; cursor: default; transform: none; }

.offline-home {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
  width: 100%;
  padding: .72rem 1.25rem;
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font-sans);
  font-size: .88rem;
  font-weight: 600;
  text-decoration: none;
  transition: background .18s;
}
.offline-home:hover { background: var(--border); }

.offline-status {
  margin-top: 1.25rem;
  font-size: .76rem;
  color: var(--text-2);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .35rem;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--danger);
  flex-shrink: 0;
}
.status-dot.online { background: #22c55e; }

.offline-logo {
  margin-top: 2.5rem;
  font-size: .85rem;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: .2px;
}
.offline-logo span { color: var(--accent); }
</style>
</head>
<body>

<div class="offline-card">
  <div class="offline-icon-wrap">
    <div class="offline-pulse"></div>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <div class="offline-title">You're offline</div>
  <div class="offline-sub">
    No internet connection detected.<br>
    Check your network and try again.
  </div>

  <button class="offline-retry" id="retryBtn" onclick="retryConnection()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    Try again
  </button>

  <a class="offline-home" href="/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    Go to Home
  </a>

  <div class="offline-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Offline</span>
  </div>
</div>

<div class="offline-logo">PU-<span>Connect</span></div>

<script>
function retryConnection() {
  const btn = document.getElementById('retryBtn');
  btn.disabled = true;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .7s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Checking…';

  setTimeout(() => {
    if (navigator.onLine) {
      location.href = document.referrer && document.referrer !== location.href
        ? document.referrer
        : '/';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Try again';
    }
  }, 1200);
}

function updateStatus() {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (navigator.onLine) {
    dot.classList.add('online');
    text.textContent = 'Back online — tap Try again';
  } else {
    dot.classList.remove('online');
    text.textContent = 'Offline';
  }
}

window.addEventListener('online',  updateStatus);
window.addEventListener('offline', updateStatus);
updateStatus();

/* Auto-redirect when connection comes back */
window.addEventListener('online', () => {
  setTimeout(() => {
    if (navigator.onLine) location.reload();
  }, 800);
});
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

</body>
</html>
